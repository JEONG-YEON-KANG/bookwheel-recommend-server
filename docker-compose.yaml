version: "3.9"

services:
  recommend-dev:
    build: .
    container_name: recommend-dev
    volumes:
      - .:/app
      - model_volume:/app/models
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - bookwheel-network

volumes:
  model_volume:

networks:
  bookwheel-network:
    external: true
    name: bookwheel-backend_bookwheel-network
