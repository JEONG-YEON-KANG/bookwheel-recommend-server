services:
  recommend-dev:
    build: .
    container_name: recommend-dev
    volumes:
      - .:/app
      - model_volume:/app/models
    environment:
      - DATABASE_URL=postgresql://postgres:1234@bookwheel-postgres:5432/bookwheel
    networks:
      - bookwheel-network
    # depends_on 제거! (bookwheel-postgres는 이 compose 안에 없음)

networks:
  bookwheel-network:
    external: true

volumes:
  model_volume:
